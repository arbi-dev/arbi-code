name: Release

on:
  push:
    tags:
      - "arbi-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    # Azure Trusted Signing — set these as GitHub repo secrets to enable signed
    # builds. While unset, the signing step below is skipped and builds are
    # produced unsigned, so releases keep working in the meantime.
    env:
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      TRUSTED_SIGNING_ENDPOINT: ${{ secrets.TRUSTED_SIGNING_ENDPOINT }}
      TRUSTED_SIGNING_ACCOUNT: ${{ secrets.TRUSTED_SIGNING_ACCOUNT }}
      TRUSTED_SIGNING_PROFILE: ${{ secrets.TRUSTED_SIGNING_PROFILE }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
      - run: npm ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Azure Trusted Signing
        # No-op until the AZURE_* secrets exist, so unsigned builds keep
        # working. When present, this installs the Trusted Signing dlib,
        # writes the metadata file, and exports the env vars consumed by
        # forge.config.ts -> windowsSign.ts (signtool /dlib /dmdf).
        if: env.AZURE_CLIENT_ID != ''
        shell: pwsh
        run: |
          $pkg = "Microsoft.Trusted.Signing.Client"
          $ver = "1.0.60"   # bump to the current Trusted Signing client version
          nuget install $pkg -Version $ver -ExcludeVersion -OutputDirectory "$env:RUNNER_TEMP\ts"
          $dlib = "$env:RUNNER_TEMP\ts\$pkg\bin\x64\Azure.CodeSigning.Dlib.dll"
          if (-not (Test-Path $dlib)) { throw "Trusted Signing dlib not found: $dlib" }
          $metaPath = "$env:RUNNER_TEMP\ts-metadata.json"
          @{
            Endpoint               = $env:TRUSTED_SIGNING_ENDPOINT
            CodeSigningAccountName = $env:TRUSTED_SIGNING_ACCOUNT
            CertificateProfileName = $env:TRUSTED_SIGNING_PROFILE
          } | ConvertTo-Json | Out-File -FilePath $metaPath -Encoding ascii
          "WINDOWS_SIGN=true"             | Out-File $env:GITHUB_ENV -Append
          "AZURE_CODE_SIGNING_DLIB=$dlib" | Out-File $env:GITHUB_ENV -Append
          "AZURE_METADATA_JSON=$metaPath" | Out-File $env:GITHUB_ENV -Append
      - name: Build installer
        run: npm run make
        env:
          NODE_OPTIONS: --max-old-space-size=4096
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-windows
          path: out/make/
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/arbi-v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: build-*
          merge-multiple: true
      - name: Flatten artifacts for release
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name '*.exe' -o -name 'RELEASES' -o -name '*.nupkg' \) -exec cp {} release-assets/ \;
          ls -la release-assets/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
