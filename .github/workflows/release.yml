name: Release

on:
  push:
    tags:
      - "arbi-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - { name: windows, image: windows-latest }
          - { name: macos, image: macos-latest }
          - { name: linux, image: ubuntu-22.04 }
    runs-on: ${{ matrix.os.image }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
      - run: npm ci
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build installers
        run: npm run make
        env:
          NODE_OPTIONS: --max-old-space-size=4096
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os.name }}
          path: out/make/
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/arbi-v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: build-*
          merge-multiple: true
      - name: Flatten artifacts for release
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name '*.exe' -o -name '*.dmg' -o -name '*.zip' -o -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' -o -name 'RELEASES' -o -name '*.nupkg' \) -exec cp {} release-assets/ \;
          ls -la release-assets/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
